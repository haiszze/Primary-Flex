<div class="group rounded-xl p-4 sm:p-6 border border-gray-200 bg-white hover:shadow-md flex flex-col gap-3 cursor-pointer "
    (click)="onNavigateTo(path())">
    <!-- Header with Icon -->
    <div class="flex items-start justify-between">
        <div class="flex flex-col gap-1 flex-1">
            <h3 class="font-bold text-2xl sm:text-3xl text-gray-600 transition-colors">{{
                title() }}</h3>
            <p class="text-gray-600 text-xs font-semibold uppercase tracking-wide">{{ subtitle() }}</p>
        </div>
        <div class="text-gray-500 text-2xl group-hover:scale-110 transition-transform">
            <!-- Icon loaded from assets -->
            <img [src]="icon()" alt="Icon" class="w-8 h-8" />
        </div>
    </div>

    <!-- Description -->
    <p class="text-gray-600 text-sm leading-relaxed font-light">{{description()}}</p>

    <!-- Stats Display (Optional) -->
    <div class="flex flex-col gap-2">
        <div class="flex items-center gap-2 pt-2">
            <img [src]="uiLibIcon()" alt="Icon" class="w-8 h-8" />
            <span class="text-xs text-gray-500 font-medium">{{uiLibIconName()}}</span>
        </div>
    </div>


    <!-- Action Indicator -->
    <div class="flex justify-between items-center">
        <div
            class="flex items-center justify-between group-hover:translate-x-78 transition-transform duration-300 ease-in-out">
            <span class="text-xs text-gray-600">Click to explore</span>
        </div>
        <svg class="w-4 h-4 text-gray-600 group-hover:text-gray-600 transition-colors" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
    </div>
</div>
